# AGI Agent Configuration

[server]
host = "0.0.0.0"
port = 8080
workers = 4

[model]
# LLM API endpoint (llama.cpp server)
base_url = "http://10.10.199.146:8081"

# Model name
name = "qwen3.5-4b"

# Embedding model
embedding_model = "nomic-embed-text"
embedding_dim = 768

# Optional API key for OpenAI-compatible APIs
# api_key = "sk-..."

# Generation settings
max_tokens = 4096
temperature = 0.7

[memory]
# Path to memory storage
storage_path = "/home/administrator/.agi/memory"

# Default TTL for retrieval memories (hours)
retrieval_ttl_hours = 0

# Default namespace
default_namespace = "retrieval"

# Retrieval settings
min_similarity = 0.6
query_limit = 10

[search]
# SearXNG instance
instance = "https://search.butler.ooo"

# Settings
timeout = 30
results = 10

[training]
# Enable training
enabled = true

# Cron schedule (2 AM daily)
schedule = "0 2 * * *"

# Base model for training
model = "qwen3.5-4b"

# Output path
output_path = ".agent/models"

# Training settings
epochs = 3
batch_size = 4
gradient_accumulation_steps = 1
learning_rate = 1e-4
lora_rank = 16
warmup_steps = 10
lr_scheduler = "cosine"

# Early stopping
early_stopping_patience = 3
min_loss_improvement = 0.01

[summarization]
provider = "openai"
# api_key = "sk-..."
model = "gpt-4o-mini"
timeout = 60

[tools]
search_enabled = true
bash_enabled = true
file_tools_enabled = true
# allowed_commands = ["git", "ls", "cat", "grep"]
# bash_working_dir = "/tmp"
